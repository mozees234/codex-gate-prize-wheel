<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODEX GATE — Prize Wheel</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" onerror="window._qrUnavailable=true"></script>
<style>
  :root {
    --purple-deep:     #3D1B6B;
    --purple-mid:      #7B43B8;
    --purple-light:    #E5D6F2;
    --purple-pale:     #F5F0FB;
    --purple-lavender: #9B7BC4;
    --purple-darker:   #5B2C9C;
    --purple-number:   #C8B0E0;
    --white:           #FFFFFF;
    --green:           #2D8C4E;
    --red:             #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Calibri', 'Inter', 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at top, var(--purple-pale), #ECE0F7 70%);
    color: var(--purple-deep);
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
  }
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 30px 16px;
    width: 100%;
    max-width: 1100px;
  }
  .header {
    position: absolute;
    top: 20px; left: 30px; right: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5;
  }
  .brand { font-size: 12px; font-weight: bold; color: var(--purple-deep); letter-spacing: 4px; }
  .brand strong { font-size: 22px; letter-spacing: 3px; }
  .controls { display: flex; gap: 10px; }
  .btn-icon {
    background: var(--white);
    border: 1px solid var(--purple-light);
    color: var(--purple-deep);
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: background 0.2s;
    font-family: inherit;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }
  .btn-icon:hover { background: var(--purple-light); }

  .wheel-area {
    position: relative;
    width: min(68vh, 600px);
    max-width: 90%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pointer {
    position: absolute;
    top: -6px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 22px solid transparent;
    border-right: 22px solid transparent;
    border-top: 36px solid var(--purple-deep);
    z-index: 10;
    filter: drop-shadow(0 4px 8px rgba(61,27,107,0.25));
  }
  .wheel-rotor {
    width: 100%; height: 100%;
    transform-origin: center center;
    will-change: transform;
  }
  .wheel-rotor.spinning {
    transition: transform 5.5s cubic-bezier(0.17, 0.67, 0.18, 1);
  }
  .wheel-svg { width: 100%; height: 100%; }

  .qr-section {
    position: absolute;
    bottom: 20px;
    left: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 5;
  }
  .qr-box {
    background: var(--white);
    border: 2px solid var(--purple-light);
    border-radius: 12px;
    padding: 8px;
    width: 120px; height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .qr-box svg, .qr-box img { width: 100%; height: 100%; }
  .qr-label {
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 2px;
    color: var(--purple-mid);
    text-align: center;
  }

  .actions-area {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  .actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .result {
    font-size: 18px;
    color: var(--purple-deep);
    min-height: 24px;
    text-align: center;
    opacity: 0.85;
  }
  .result.winner { font-size: 26px; font-weight: bold; opacity: 1; }
  .spin-btn {
    padding: 16px 60px;
    font-size: 20px;
    font-weight: 800;
    background: var(--purple-deep);
    color: var(--white);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 12px 28px rgba(61,27,107,0.32);
    transition: transform 0.1s, box-shadow 0.2s;
    font-family: inherit;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(61,27,107,0.38); }
  .spin-btn:active:not(:disabled) { transform: translateY(1px); }
  .spin-btn:disabled { background: var(--purple-lavender); cursor: not-allowed; box-shadow: none; }
  .spin-btn.has-queue { background: var(--green); }
  .spin-btn.has-queue:disabled { background: #7ab895; }
  .manual-spin-btn {
    padding: 8px 24px;
    font-size: 11px;
    font-weight: bold;
    background: transparent;
    color: var(--purple-lavender);
    border: 1px solid var(--purple-light);
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 2px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .manual-spin-btn:hover:not(:disabled) { background: var(--purple-pale); color: var(--purple-deep); }
  .manual-spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .hint-key {
    font-size: 10px;
    color: var(--purple-lavender);
    letter-spacing: 2px;
  }
  .queue-badge {
    display: inline-block;
    background: var(--green);
    color: var(--white);
    font-size: 11px;
    font-weight: bold;
    padding: 4px 12px;
    border-radius: 999px;
    letter-spacing: 1px;
  }
  .queue-badge.empty { background: var(--purple-lavender); }

  .conn-status {
    position: absolute;
    bottom: 18px;
    right: 30px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--purple-lavender);
    z-index: 5;
  }
  .conn-status.online { color: var(--green); }

  /* ---------- SIDE PANELS (queue + winners) ---------- */
  .side-panel {
    position: fixed;
    right: 24px;
    width: 260px;
    max-height: 44vh;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(6px);
    border: 1px solid var(--purple-light);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(61, 27, 107, 0.12);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    z-index: 4;
  }
  .queue-panel { top: 80px; }
  .winners-panel { bottom: 24px; }
  .side-panel .sp-title {
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 3px;
    color: var(--purple-mid);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .side-panel .sp-count {
    display: inline-block;
    background: var(--purple-deep);
    color: var(--white);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }
  .side-panel.winners-panel .sp-count { background: var(--green); }
  .side-panel .sp-list {
    overflow-y: auto;
    flex: 1;
    margin: 0 -4px;
    padding: 0 4px;
  }
  .side-panel .sp-list::-webkit-scrollbar { width: 4px; }
  .side-panel .sp-list::-webkit-scrollbar-thumb {
    background: var(--purple-light);
    border-radius: 4px;
  }
  .queue-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid var(--purple-pale);
    font-size: 13px;
  }
  .queue-row:last-child { border-bottom: none; }
  .queue-row.next {
    background: var(--purple-pale);
    border-radius: 8px;
    padding: 8px 10px;
    margin: 0 -6px 4px;
    border-bottom: none;
  }
  .queue-row .q-pos {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    background: var(--purple-light);
    color: var(--purple-deep);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
  }
  .queue-row.next .q-pos {
    background: var(--purple-deep);
    color: var(--white);
  }
  .queue-row .q-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 600;
    color: var(--purple-deep);
  }
  .queue-row .q-course {
    font-size: 10px;
    color: var(--purple-lavender);
  }
  .winner-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid var(--purple-pale);
    font-size: 13px;
  }
  .winner-row:last-child { border-bottom: none; }
  .winner-row .w-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .winner-row .w-body { flex: 1; min-width: 0; }
  .winner-row .w-person {
    font-weight: 600;
    color: var(--purple-deep);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .winner-row .w-prize {
    font-size: 10px;
    color: var(--purple-lavender);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .side-empty {
    padding: 18px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--purple-lavender);
    font-style: italic;
  }

  @media (max-width: 1100px) {
    .side-panel { display: none; }
  }

  .winner-overlay {
    position: fixed; inset: 0;
    background: rgba(245,240,251,0.97);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    text-align: center;
    padding: 40px;
  }
  .winner-overlay.show { display: flex; animation: fadein 0.4s ease; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .winner-overlay .winner-icon {
    font-size: clamp(100px, 18vh, 200px);
    margin-bottom: 16px;
    animation: pop 0.6s ease;
  }
  @keyframes pop { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); } }
  .winner-overlay .winner-person {
    font-size: clamp(14px, 2vh, 20px);
    color: var(--purple-mid);
    letter-spacing: 4px;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .winner-overlay .winner-label {
    font-size: clamp(28px, 5vh, 50px);
    color: var(--purple-deep);
    letter-spacing: 2px;
    font-weight: bold;
  }
  .winner-overlay .winner-name {
    font-size: clamp(48px, 10vh, 120px);
    font-weight: bold;
    color: var(--purple-deep);
    margin: 10px 0 40px;
    letter-spacing: 2px;
  }
  .winner-overlay .winner-close {
    padding: 18px 56px;
    font-size: 16px;
    background: var(--purple-deep);
    color: var(--white);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 3px;
    font-family: inherit;
  }
  .winner-overlay .winner-close:hover { background: var(--purple-darker); }

  .register-view {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background: radial-gradient(ellipse at top, var(--purple-pale), #ECE0F7 70%);
  }
  .register-card {
    background: var(--white);
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(61,27,107,0.13);
  }
  .register-card .r-brand {
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--purple-deep);
    margin-bottom: 4px;
  }
  .register-card .r-title {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: var(--purple-deep);
    margin-bottom: 24px;
  }
  .register-card label {
    display: block;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 2px;
    color: var(--purple-lavender);
    margin-bottom: 4px;
    margin-top: 14px;
  }
  .register-card label:first-of-type { margin-top: 0; }
  .register-card input {
    display: block;
    width: 100%;
    padding: 14px 14px;
    border-radius: 10px;
    border: 1px solid var(--purple-light);
    background: var(--purple-pale);
    color: var(--purple-deep);
    font-size: 16px;
    font-family: inherit;
  }
  .register-card input:focus { outline: none; border-color: var(--purple-mid); background: var(--white); }
  .register-submit {
    margin-top: 24px;
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 800;
    background: var(--purple-deep);
    color: var(--white);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 3px;
    font-family: inherit;
    box-shadow: 0 8px 20px rgba(61,27,107,0.25);
  }
  .register-submit:hover { background: var(--purple-darker); }
  .register-submit:disabled { background: var(--purple-lavender); cursor: not-allowed; }
  .register-error {
    margin-top: 12px;
    padding: 10px;
    background: #fde8e8;
    color: var(--red);
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    display: none;
  }
  .register-success { text-align: center; display: none; }
  .register-success .rs-icon { font-size: 64px; margin-bottom: 12px; }
  .register-success .rs-title {
    font-size: 22px;
    font-weight: bold;
    color: var(--purple-deep);
    margin-bottom: 8px;
  }
  .register-success .rs-position {
    font-size: 16px;
    color: var(--purple-mid);
    margin-bottom: 20px;
  }
  .register-success .rs-status {
    padding: 16px;
    background: var(--purple-pale);
    border-radius: 12px;
    font-size: 14px;
    color: var(--purple-deep);
  }
  .register-success .rs-prize {
    display: none;
    margin-top: 16px;
    padding: 20px;
    background: var(--purple-pale);
    border-radius: 12px;
  }
  .register-success .rs-prize .rp-icon { font-size: 48px; }
  .register-success .rs-prize .rp-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--purple-mid);
    font-weight: bold;
    margin: 8px 0 4px;
  }
  .register-success .rs-prize .rp-name {
    font-size: 24px;
    font-weight: bold;
    color: var(--purple-deep);
  }
</style>
</head>
<body>

<!-- ===== DISPLAY VIEW ===== -->
<div id="displayView">
  <aside class="side-panel queue-panel" id="queuePanel">
    <div class="sp-title">
      <span>IN QUEUE</span>
      <span class="sp-count" id="queueCount">0</span>
    </div>
    <div class="sp-list" id="queueListPanel"></div>
  </aside>
  <aside class="side-panel winners-panel" id="winnersPanel">
    <div class="sp-title">
      <span>RECENT WINNERS</span>
      <span class="sp-count" id="winnersCount">0</span>
    </div>
    <div class="sp-list" id="winnersList"></div>
  </aside>
  <div class="app">
    <div class="stage">
      <div class="header">
        <div class="brand">CODEX GATE <strong>&middot;</strong> PRIZE WHEEL</div>
        <div class="controls">
          <a class="btn-icon" href="/admin" target="_blank" rel="noopener">&#9881; ADMIN</a>
          <button class="btn-icon" id="fullscreenBtn">&#9654; FULLSCREEN</button>
        </div>
      </div>

      <div class="wheel-area">
        <div class="pointer"></div>
        <div class="wheel-rotor" id="wheelRotor">
          <svg class="wheel-svg" viewBox="-260 -260 520 520" id="wheelSvg" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>

      <div class="qr-section">
        <div class="qr-box" id="qrBox"><span style="font-size:11px;color:var(--purple-lavender);text-align:center;">Loading QR...</span></div>
        <div class="qr-label">SCAN TO PLAY</div>
      </div>

      <div class="actions-area">
        <div class="actions">
          <div class="result" id="result">Scan the QR code or press SPIN</div>
          <div id="queueBadgeArea"></div>
          <button class="spin-btn" id="spinBtn">SPIN</button>
          <button class="manual-spin-btn" id="manualSpinBtn" style="display:none;">MANUAL SPIN</button>
          <div class="hint-key">SPACEBAR &middot; SPIN &nbsp; F &middot; FULLSCREEN</div>
        </div>
      </div>

      <div class="conn-status" id="connStatus">CONNECTING&hellip;</div>
    </div>
  </div>
</div>

<!-- ===== REGISTER VIEW (mobile) ===== -->
<div id="registerView" style="display:none;">
  <div class="register-view">
    <div class="register-card" id="registerFormCard">
      <div class="r-brand">CODEX GATE</div>
      <div class="r-title">Spin the Prize Wheel!</div>
      <form id="registerForm" autocomplete="off">
        <label>YOUR NAME</label>
        <input id="regName" placeholder="e.g. John Doe" required />
        <label>COURSE / PROGRAMME</label>
        <input id="regCourse" placeholder="e.g. Computer Science" required />
        <label>PHONE NUMBER</label>
        <input id="regPhone" type="tel" placeholder="e.g. 012-345-6789" required />
        <label>EMAIL</label>
        <input id="regEmail" type="email" placeholder="e.g. john@example.com" required />
        <button type="submit" class="register-submit" id="regSubmitBtn">REGISTER &amp; SPIN</button>
        <div class="register-error" id="regError"></div>
      </form>
    </div>
    <div class="register-card register-success" id="registerSuccess">
      <div class="rs-icon">&#9989;</div>
      <div class="rs-title">You're in the queue!</div>
      <div class="rs-position" id="rsPosition">Position: #1</div>
      <div class="rs-status" id="rsStatus">Watch the big screen for your turn&hellip;</div>
      <div class="rs-prize" id="rsPrize">
        <div class="rp-icon" id="rsPrizeIcon"></div>
        <div class="rp-label">YOU WON</div>
        <div class="rp-name" id="rsPrizeName"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== WINNER OVERLAY ===== -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-icon" id="winnerIcon"></div>
  <div class="winner-person" id="winnerPerson"></div>
  <div class="winner-label">WON</div>
  <div class="winner-name" id="winnerPrizeName"></div>
  <button class="winner-close" id="winnerClose">CONTINUE</button>
</div>

<script>
const COLORS = {
  deep: '#3D1B6B', mid: '#7B43B8', light: '#E5D6F2', pale: '#F5F0FB',
  lavender: '#9B7BC4', darker: '#5B2C9C', number: '#C8B0E0', white: '#FFFFFF',
};

const urlParams = new URLSearchParams(window.location.search);
const IS_REGISTER = urlParams.has('register');

if (IS_REGISTER) {
  document.getElementById('displayView').style.display = 'none';
  document.getElementById('registerView').style.display = '';
} else {
  document.getElementById('registerView').style.display = 'none';
}

const $ = id => document.getElementById(id);
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeXml(s) { return escapeHtml(s); }

let items = [];
let spinQueue = [];
let recentWinners = [];
let isSpinning = false;
let currentRotation = 0;
let currentPerson = null;
let connectedOnce = false;
const QUEUE_DISPLAY_LIMIT = 10;
const WINNERS_DISPLAY_LIMIT = 10;

const wheelRotor = $('wheelRotor');
const wheelSvg = $('wheelSvg');
const spinBtn = $('spinBtn');
const manualSpinBtn = $('manualSpinBtn');
const resultEl = $('result');
const queueBadgeArea = $('queueBadgeArea');
const fullscreenBtn = $('fullscreenBtn');
const winnerOverlay = $('winnerOverlay');
const winnerIcon = $('winnerIcon');
const winnerPerson = $('winnerPerson');
const winnerPrizeName = $('winnerPrizeName');
const winnerClose = $('winnerClose');
const qrBox = $('qrBox');
const connStatus = $('connStatus');

function getActiveItems() {
  return items.filter(i => i.weight > 0 && (i.stock === -1 || i.stock > 0));
}

function drawWheel() {
  if (IS_REGISTER) return;
  wheelSvg.innerHTML = '';
  const active = getActiveItems();
  const n = active.length;
  if (n === 0) {
    wheelSvg.innerHTML = '<text text-anchor="middle" fill="#9B7BC4" font-size="18">No prizes available</text>';
    return;
  }

  const R_OUTER = 240, R_RIM = 230, R_INNER = 200, R_HUB = 38, R_CABIN = 215;
  const CABIN_W = Math.min(74, 1100 / n);
  const CABIN_H = Math.min(58, CABIN_W * 0.85);
  let g = '';

  g += `<circle r="${R_OUTER}" fill="none" stroke="${COLORS.deep}" stroke-width="3" opacity="0.35"/>`;
  g += `<circle r="${R_RIM}" fill="none" stroke="${COLORS.deep}" stroke-width="6"/>`;
  g += `<circle r="${R_INNER}" fill="none" stroke="${COLORS.mid}" stroke-width="3" opacity="0.7"/>`;

  for (let i = 0; i < n; i++) {
    const ang = (i / n) * 2 * Math.PI - Math.PI / 2;
    const x2 = R_INNER * Math.cos(ang), y2 = R_INNER * Math.sin(ang);
    g += `<line x1="0" y1="0" x2="${x2}" y2="${y2}" stroke="${COLORS.mid}" stroke-width="3" opacity="0.55"/>`;
  }
  for (let i = 0; i < n; i++) {
    const ang = (i / n) * 2 * Math.PI - Math.PI / 2;
    const x1 = R_RIM * Math.cos(ang), y1 = R_RIM * Math.sin(ang);
    const x2 = R_CABIN * Math.cos(ang), y2 = R_CABIN * Math.sin(ang);
    g += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${COLORS.deep}" stroke-width="3"/>`;
    g += `<circle cx="${x1}" cy="${y1}" r="3" fill="${COLORS.deep}"/>`;
  }
  g += `<circle r="${R_HUB}" fill="${COLORS.deep}" stroke="${COLORS.mid}" stroke-width="3"/>`;
  g += `<circle r="${R_HUB * 0.45}" fill="${COLORS.light}"/>`;
  g += `<circle r="${R_HUB * 0.18}" fill="${COLORS.deep}"/>`;

  for (let i = 0; i < n; i++) {
    const ang = (i / n) * 2 * Math.PI - Math.PI / 2;
    const cx = R_CABIN * Math.cos(ang), cy = R_CABIN * Math.sin(ang);
    g += `<g transform="translate(${cx},${cy})">`;
    g += `<rect x="${-CABIN_W/2}" y="${-CABIN_H/2}" width="${CABIN_W}" height="${CABIN_H}" rx="12" ry="12" fill="${COLORS.light}" stroke="${COLORS.deep}" stroke-width="2.5"/>`;
    g += `<rect x="${-CABIN_W/2+4}" y="${-CABIN_H/2+4}" width="${CABIN_W-8}" height="6" rx="3" fill="${COLORS.mid}" opacity="0.5"/>`;
    g += `<text y="3" text-anchor="middle" dominant-baseline="central" font-size="${Math.min(30, CABIN_W*0.42)}">${escapeXml(active[i].icon || '\u{1F381}')}</text>`;
    g += `</g>`;
  }
  wheelSvg.innerHTML = g;
  wheelRotor.style.transform = `rotate(${currentRotation}deg)`;
}

function weightedPick() {
  const active = getActiveItems();
  if (active.length === 0) return -1;
  const total = active.reduce((s, i) => s + Math.max(0, i.weight || 0), 0);
  if (total <= 0) return -1;
  let r = Math.random() * total;
  for (let i = 0; i < active.length; i++) {
    r -= Math.max(0, active[i].weight || 0);
    if (r <= 0) return i;
  }
  return active.length - 1;
}

function updateSpinButton() {
  if (IS_REGISTER) return;
  if (spinQueue.length > 0) {
    const next = spinQueue[0];
    spinBtn.textContent = `SPIN ▸ ${(next.name || '').toUpperCase()}`;
    spinBtn.classList.add('has-queue');
    manualSpinBtn.style.display = '';
    queueBadgeArea.innerHTML = `<span class="queue-badge">${spinQueue.length} in queue</span>`;
  } else {
    spinBtn.textContent = 'SPIN';
    spinBtn.classList.remove('has-queue');
    manualSpinBtn.style.display = 'none';
    queueBadgeArea.innerHTML = '';
  }
}

function renderQueueList() {
  if (IS_REGISTER) return;
  const list = document.getElementById('queueListPanel');
  const count = document.getElementById('queueCount');
  count.textContent = spinQueue.length;
  if (spinQueue.length === 0) {
    list.innerHTML = '<div class="side-empty">No one in queue.<br>Scan the QR to join!</div>';
    return;
  }
  const shown = spinQueue.slice(0, QUEUE_DISPLAY_LIMIT);
  list.innerHTML = shown.map((entry, i) => {
    const cls = i === 0 ? 'queue-row next' : 'queue-row';
    const course = entry.course ? `<span class="q-course">${escapeHtml(entry.course)}</span>` : '';
    return `<div class="${cls}">
      <div class="q-pos">${i + 1}</div>
      <div class="q-name">${escapeHtml(entry.name || '')}</div>
      ${course}
    </div>`;
  }).join('');
}

function renderWinners() {
  if (IS_REGISTER) return;
  const list = document.getElementById('winnersList');
  const count = document.getElementById('winnersCount');
  count.textContent = recentWinners.length;
  if (recentWinners.length === 0) {
    list.innerHTML = '<div class="side-empty">No winners yet.<br>Spin to get started!</div>';
    return;
  }
  list.innerHTML = recentWinners.slice(0, WINNERS_DISPLAY_LIMIT).map(w => `
    <div class="winner-row">
      <div class="w-icon">${escapeHtml(w.icon || '\u{1F381}')}</div>
      <div class="w-body">
        <div class="w-person">${escapeHtml(w.person || 'Anonymous')}</div>
        <div class="w-prize">${escapeHtml(w.name || '')}</div>
      </div>
    </div>`).join('');
}

async function spin(person) {
  if (isSpinning || IS_REGISTER) return;
  const active = getActiveItems();
  if (active.length === 0) { resultEl.textContent = 'No prizes available.'; return; }

  const winIdx = weightedPick();
  if (winIdx < 0) { resultEl.textContent = 'No prizes with weight > 0.'; return; }

  isSpinning = true;
  spinBtn.disabled = true;
  manualSpinBtn.disabled = true;
  currentPerson = person || null;
  resultEl.textContent = person ? `Spinning for ${person.name}…` : 'Spinning…';
  resultEl.className = 'result';
  winnerOverlay.classList.remove('show');

  const n = active.length;
  const winnerAngle = (winIdx / n) * 360;
  const sliceWidth = 360 / n;
  const jitter = (Math.random() - 0.5) * sliceWidth * 0.45;
  const currentMod = ((currentRotation % 360) + 360) % 360;
  let targetMod = (360 - winnerAngle + jitter) % 360;
  if (targetMod < 0) targetMod += 360;
  const delta = (targetMod - currentMod + 360) % 360;
  currentRotation += 6 * 360 + delta;

  wheelRotor.classList.add('spinning');
  wheelRotor.style.transform = `rotate(${currentRotation}deg)`;

  const winner = active[winIdx];
  setTimeout(async () => {
    isSpinning = false;
    spinBtn.disabled = false;
    manualSpinBtn.disabled = false;
    wheelRotor.classList.remove('spinning');

    const personName = currentPerson ? currentPerson.name : null;
    if (personName) {
      resultEl.innerHTML = `\u{1F389} <strong>${escapeHtml(personName)}</strong> won <strong>${escapeHtml(winner.icon)} ${escapeHtml(winner.name)}</strong>`;
    } else {
      resultEl.innerHTML = `\u{1F389} <strong>${escapeHtml(winner.icon)} ${escapeHtml(winner.name)}</strong>`;
    }
    resultEl.className = 'result winner';
    showWinner(winner, personName);
    reportResult(currentPerson, winner);
    currentPerson = null;
  }, 5650);
}

function showWinner(prize, personName) {
  winnerIcon.textContent = prize.icon;
  if (personName) {
    winnerPerson.textContent = personName.toUpperCase();
    winnerPerson.style.display = '';
  } else {
    winnerPerson.style.display = 'none';
  }
  winnerPrizeName.textContent = prize.name;
  winnerOverlay.classList.add('show');
}

async function reportResult(person, prize) {
  try {
    await fetch('/api/result', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: person ? person.id : null,
        itemId: prize.id,
        prize: { icon: prize.icon, name: prize.name }
      })
    });
    pollItems();
    pollQueue();
  } catch { /* ignore */ }
}

async function pollItems() {
  try {
    const res = await fetch('/api/items', { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return false;
    const data = await res.json();
    items = (data.items || []).map(i => ({
      id: i.id,
      icon: i.icon || '\u{1F381}',
      name: i.name || '',
      weight: i.weight || 0,
      stock: typeof i.stock === 'number' ? i.stock : -1,
      won: i.won || 0,
    }));
    if (!isSpinning) drawWheel();
    return true;
  } catch {
    return false;
  }
}

async function pollQueue() {
  try {
    const res = await fetch('/api/queue', { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return false;
    const data = await res.json();
    if (!isSpinning) {
      spinQueue = data.queue || [];
      updateSpinButton();
      renderQueueList();
    }
    return true;
  } catch {
    return false;
  }
}

async function pollHistory() {
  try {
    const res = await fetch('/api/history', { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return false;
    const data = await res.json();
    recentWinners = (data.history || []).slice(0, WINNERS_DISPLAY_LIMIT);
    renderWinners();
    return true;
  } catch {
    return false;
  }
}

function updateConnStatus(ok) {
  if (ok) {
    connStatus.textContent = 'ONLINE';
    connStatus.className = 'conn-status online';
    connectedOnce = true;
  } else {
    connStatus.textContent = connectedOnce ? 'RECONNECTING…' : 'CONNECTING…';
    connStatus.className = 'conn-status';
  }
}

async function pollLoop() {
  const [a, b, c] = await Promise.all([pollItems(), pollQueue(), pollHistory()]);
  updateConnStatus(a && b && c);
  setTimeout(pollLoop, 3000);
}

function generateQR() {
  if (IS_REGISTER || !qrBox) return;
  const base = window.location.origin + window.location.pathname;
  const registerUrl = base + '?register';

  if (window._qrUnavailable || typeof qrcode === 'undefined') {
    qrBox.innerHTML = `<span style="font-size:9px;color:var(--purple-lavender);text-align:center;padding:4px;word-break:break-all;">${escapeHtml(registerUrl)}</span>`;
    return;
  }
  try {
    const qr = qrcode(0, 'M');
    qr.addData(registerUrl);
    qr.make();
    const size = qr.getModuleCount();
    const cellSize = Math.floor(100 / size);
    let svg = `<svg viewBox="0 0 ${size * cellSize} ${size * cellSize}" xmlns="http://www.w3.org/2000/svg">`;
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (qr.isDark(r, c)) {
          svg += `<rect x="${c*cellSize}" y="${r*cellSize}" width="${cellSize}" height="${cellSize}" fill="${COLORS.deep}"/>`;
        }
      }
    }
    svg += '</svg>';
    qrBox.innerHTML = svg;
  } catch {
    qrBox.innerHTML = `<span style="font-size:9px;color:var(--purple-lavender);text-align:center;padding:4px;">QR error</span>`;
  }
}

async function fetchNextFromServer() {
  try {
    const res = await fetch('/api/queue/next', { method: 'POST' });
    if (res.ok) return await res.json();
  } catch { /* ignore */ }
  return null;
}

function initDisplayEvents() {
  if (IS_REGISTER) return;

  spinBtn.addEventListener('click', async () => {
    if (spinQueue.length > 0) {
      const person = await fetchNextFromServer();
      if (person) {
        spinQueue = spinQueue.filter(q => q.id !== person.id);
        updateSpinButton();
        spin(person);
      } else {
        spin(null);
      }
    } else {
      spin(null);
    }
  });
  manualSpinBtn.addEventListener('click', () => spin(null));
  winnerClose.addEventListener('click', () => winnerOverlay.classList.remove('show'));
  fullscreenBtn.addEventListener('click', toggleFullscreen);

  document.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.code === 'Space') { e.preventDefault(); if (!isSpinning) spinBtn.click(); }
    else if (e.code === 'KeyF') { e.preventDefault(); toggleFullscreen(); }
    else if (e.code === 'Escape') { winnerOverlay.classList.remove('show'); }
  });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.().catch(() => {});
  } else {
    document.exitFullscreen?.();
  }
}

function initRegisterForm() {
  if (!IS_REGISTER) return;
  const form = $('registerForm');
  const formCard = $('registerFormCard');
  const successCard = $('registerSuccess');
  const errorEl = $('regError');
  const submitBtn = $('regSubmitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'SUBMITTING…';

    const data = {
      name: $('regName').value.trim(),
      course: $('regCourse').value.trim(),
      phone: $('regPhone').value.trim(),
      email: $('regEmail').value.trim(),
    };

    if (!data.name || !data.course || !data.phone || !data.email) {
      errorEl.textContent = 'Please fill in all fields.';
      errorEl.style.display = '';
      submitBtn.disabled = false;
      submitBtn.textContent = 'REGISTER & SPIN';
      return;
    }

    try {
      const res = await fetch('/api/queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error('Server error');
      const result = await res.json();

      formCard.style.display = 'none';
      successCard.style.display = 'block';
      $('rsPosition').textContent = `Position: #${result.position}`;
      if (result.id) pollRegistrationStatus(result.id);
    } catch {
      errorEl.textContent = 'Could not connect. Please try again or ask the operator.';
      errorEl.style.display = '';
      submitBtn.disabled = false;
      submitBtn.textContent = 'REGISTER & SPIN';
    }
  });
}

async function pollRegistrationStatus(id) {
  const statusEl = $('rsStatus');
  const prizeEl = $('rsPrize');
  const posEl = $('rsPosition');

  try {
    const res = await fetch(`/api/status/${id}`);
    if (res.ok) {
      const data = await res.json();
      if (data.status === 'completed' && data.prize) {
        statusEl.textContent = 'Your prize is ready! Show this screen to collect it.';
        prizeEl.style.display = '';
        $('rsPrizeIcon').textContent = data.prize.icon;
        $('rsPrizeName').textContent = data.prize.name;
        posEl.textContent = '';
        return;
      } else if (data.status === 'spinning') {
        statusEl.textContent = 'Your turn! Watch the big screen…';
        posEl.textContent = '';
      } else {
        posEl.textContent = `Position: #${data.position || '?'}`;
        statusEl.textContent = 'Watch the big screen for your turn…';
      }
    }
  } catch { /* ignore */ }
  setTimeout(() => pollRegistrationStatus(id), 2500);
}

if (IS_REGISTER) {
  initRegisterForm();
} else {
  generateQR();
  initDisplayEvents();
  renderQueueList();
  renderWinners();
  pollLoop();
}
</script>
